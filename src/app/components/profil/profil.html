<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">

  @if (auth.currentUser(); as user) {
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-xl shadow-md border border-gray-100">

      <div class="flex flex-col items-center">
        <div class="h-24 w-24 bg-blue-600 rounded-full flex items-center justify-center text-white text-4xl font-bold shadow-inner uppercase mb-4">
          {{ user.name.charAt(0) }}
        </div>
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">
          Mon Profil
        </h1>
        <p class="text-sm text-gray-500 mt-1">Gérez vos informations personnelles</p>
      </div>

      <div class="mt-8 space-y-4 border-t border-b border-gray-100 py-6">

        <div class="flex justify-between items-center py-2">
          <span class="text-sm font-medium text-gray-500">Nom d'utilisateur</span>
          <span class="text-base font-semibold text-gray-900">{{ user.name }}</span>
        </div>

        <div class="flex justify-between items-center py-2">
          <span class="text-sm font-medium text-gray-500">Adresse email</span>
          <span class="text-base font-semibold text-gray-900">{{ user.email }}</span>
        </div>

        <div class="flex justify-between items-center py-2">
          <span class="text-sm font-medium text-gray-500">Statut du compte</span>
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
            Actif (Local)
          </span>
        </div>
      </div>

      <div class="flex flex-col gap-3 pt-2">
        <a
          routerLink="/pokemons"
          class="w-full flex justify-center py-2.5 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors text-center"
        >
          Retour aux Pokémons
        </a>

        <button
          (click)="onLogout()"
          class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors cursor-pointer"
        >
          Se déconnecter
        </button>
      </div>

    </div>
  } @else {
    <div class="text-center text-gray-600">
      <p class="animate-pulse">Chargement de votre profil...</p>
    </div>
  }

</div>
